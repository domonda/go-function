# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.24

    - name: Build
      run: go list -f '{{.Dir}}' -m | xargs -I {} go build {}/...

    - name: Vet
      run: go list -f '{{.Dir}}' -m | xargs -I {} go vet {}/...

    - name: Test
      run: go list -f '{{.Dir}}' -m | xargs -I {} go test -count=1 -v {}/...

    - name: Gosec
      run: go list -f '{{.Dir}}' -m | xargs -I {} go tool gosec {}/...
